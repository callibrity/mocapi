# Default values bound to MocapiOAuth2Properties. Overridable by the application's own
# application.properties / application.yml / environment variables.
#
# No default for mocapi.oauth2.resource — it's required and host-dependent, so misconfig fails
# loudly at startup via the @NotBlank constraint on the record component.
mocapi.oauth2.authorization-servers=
mocapi.oauth2.scopes=
