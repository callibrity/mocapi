<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" role="img">
  <title>Mocapi — A Spring Boot framework for MCP servers, by Callibrity</title>
  <desc>The @Mocapi logo: a dark plum rounded pill containing a yellow @ symbol followed by "Mocapi" in white monospace text, with "by Callibrity" below in purple.</desc>
  <rect x="65" y="10" width="230" height="62" rx="14" fill="#360D2D"/>
  <text x="180" y="50" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'SF Mono', 'Menlo', 'Consolas', monospace" font-size="32" font-weight="600">
    <tspan fill="#FFCD00">@</tspan><tspan fill="#FFFFFF">Mocapi</tspan>
  </text>
  <text x="180" y="92" text-anchor="middle" font-family="'Instrument Sans', 'Inter', system-ui, sans-serif" font-size="11" fill="#C793BC" letter-spacing="2" font-weight="500">BY CALLIBRITY</text>
</svg>
