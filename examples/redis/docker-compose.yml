services:
  redis:
    image: redis:7-alpine
    container_name: mocapi-example-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
