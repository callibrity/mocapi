services:
  postgres:
    image: postgres:16-alpine
    container_name: mocapi-example-postgres
    environment:
      POSTGRES_DB: mocapi
      POSTGRES_USER: mocapi
      POSTGRES_PASSWORD: mocapi
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mocapi -d mocapi"]
      interval: 5s
      timeout: 3s
      retries: 5
