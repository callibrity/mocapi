spring.application.name=mocapi-stdio-example
spring.main.web-application-type=none
spring.main.banner-mode=off
spring.threads.virtual.enabled=true

mocapi.stdio.enabled=true

# Everything to stderr — stdout is reserved for MCP protocol traffic.
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
logging.level.root=WARN
logging.level.com.callibrity.mocapi=INFO
